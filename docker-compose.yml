# zwela-landing — Next.js + Nginx + Let's Encrypt (Certbot).
# From zwela-landing/: docker compose up -d --build
# EC2: Ansible rsyncs this tree; compose build.context is this directory.

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: "3000"
      # Docker sets HOSTNAME to the container id; Next standalone binds to it → often loopback-only → nginx 502.
      HOSTNAME: "0.0.0.0"
    expose:
      - "3000"
    networks:
      - zwela-landing

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/active.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot-www:/var/www/certbot:ro
      - certbot-etc:/etc/letsencrypt:ro
    depends_on:
      - app
    networks:
      - zwela-landing

  certbot:
    image: certbot/certbot:latest
    profiles:
      - tls-tooling
    volumes:
      - certbot-etc:/etc/letsencrypt
      - certbot-www:/var/www/certbot

networks:
  zwela-landing:
    driver: bridge

volumes:
  certbot-www:
  certbot-etc:
